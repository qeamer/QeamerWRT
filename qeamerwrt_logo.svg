<svg width="720" height="220" viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="QeamerWRT logo">
  <defs>
    <linearGradient id="qg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="qg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Mark: geometric Q built from a ring + node tail -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="140" height="140" rx="34" fill="url(#qg2)"/>
    <!-- ring -->
    <circle cx="70" cy="70" r="40" fill="none" stroke="url(#qg)" stroke-width="12"/>
    <!-- inner dot (signal/node) -->
    <circle cx="70" cy="70" r="9" fill="#14B8A6"/>
    <!-- Q tail / connection -->
    <rect x="88" y="88" width="34" height="12" rx="6" transform="rotate(45 88 88)" fill="#3B82F6"/>
    <!-- subtle signal ticks -->
    <circle cx="70" cy="70" r="56" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.25" stroke-dasharray="3 9"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(210,0)">
    <text x="0" y="118" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="68" font-weight="700" fill="#0F172A" letter-spacing="-1">Qeamer<tspan fill="url(#qg)">WRT</tspan></text>
    <text x="3" y="152" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="500" fill="#64748B" letter-spacing="3">SECURE ROUTER FIRMWARE</text>
  </g>
</svg>
