<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="600" fill="#0F172A"/>

  <!-- Banner -->
  <rect x="24" y="24" width="952" height="72" rx="12" fill="#1E293B" stroke="#334155"/>
  <rect x="40" y="38" width="44" height="44" rx="11" fill="#273449"/>
  <circle cx="62" cy="60" r="13" fill="none" stroke="url(#g)" stroke-width="4"/>
  <circle cx="62" cy="60" r="3.5" fill="#2DD4BF"/>
  <text x="100" y="68" font-size="24" font-weight="700" fill="#F1F5F9">Qeamer<tspan fill="url(#g)">WRT</tspan></text>
  <text x="960" y="65" font-size="13" letter-spacing="1" fill="#2DD4BF" text-anchor="end">build by Kent &quot;Qeamer&quot; Nygjerdet</text>

  <!-- Nav -->
  <rect x="24" y="112" width="200" height="464" rx="12" fill="#1E293B" stroke="#334155"/>
  <rect x="36" y="124" width="176" height="38" rx="8" fill="#273449"/>
  <rect x="36" y="124" width="3" height="38" fill="#14B8A6"/>
  <text x="52" y="148" font-size="14" fill="#F1F5F9">Dashboard</text>
  <text x="52" y="190" font-size="14" fill="#94A3B8">Firewall</text>
  <text x="52" y="226" font-size="14" fill="#94A3B8">DNS / DoT</text>
  <text x="52" y="262" font-size="14" fill="#94A3B8">DDoS shield</text>
  <text x="52" y="298" font-size="14" fill="#94A3B8">Administration</text>
  <text x="52" y="334" font-size="14" fill="#94A3B8">System log</text>

  <!-- Card -->
  <rect x="240" y="112" width="736" height="464" rx="12" fill="#1E293B" stroke="#334155"/>
  <rect x="264" y="136" width="4" height="22" fill="url(#g)"/>
  <text x="280" y="154" font-size="18" font-weight="700" fill="#F1F5F9">Security status</text>

  <!-- rows -->
  <g font-size="14">
    <text x="264" y="200" fill="#94A3B8">WAN admin access</text>
    <text x="936" y="200" fill="#2DD4BF" font-weight="600" text-anchor="end">Disabled</text>
    <line x1="264" y1="214" x2="936" y2="214" stroke="#334155"/>
    <text x="264" y="246" fill="#94A3B8">DNS-over-TLS</text>
    <text x="936" y="246" fill="#2DD4BF" font-weight="600" text-anchor="end">Active · DNSSEC</text>
    <line x1="264" y1="260" x2="936" y2="260" stroke="#334155"/>
    <text x="264" y="292" fill="#94A3B8">Firewall</text>
    <text x="936" y="292" fill="#2DD4BF" font-weight="600" text-anchor="end">Default-drop · blocklists on</text>
    <line x1="264" y1="306" x2="936" y2="306" stroke="#334155"/>
    <text x="264" y="338" fill="#94A3B8">UPnP</text>
    <text x="936" y="338" fill="#2DD4BF" font-weight="600" text-anchor="end">Off</text>
    <line x1="264" y1="352" x2="936" y2="352" stroke="#334155"/>
  </g>

  <text x="264" y="396" font-size="11" letter-spacing="2" fill="#64748B">ADMIN PORT</text>
  <rect x="264" y="408" width="672" height="40" rx="8" fill="#0F172A" stroke="#3B82F6"/>
  <text x="280" y="433" font-size="14" fill="#F1F5F9">8443</text>

  <rect x="264" y="470" width="150" height="42" rx="8" fill="url(#g)"/>
  <text x="339" y="497" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Apply &amp; save</text>
</svg>
