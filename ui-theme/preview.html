<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>QeamerWRT — UI theme preview</title>
<link rel="stylesheet" href="qeamer_theme.css">
<style>
  body{margin:0;padding:24px;}
  .wrap{max-width:980px;margin:0 auto;}
  .banner{display:flex;align-items:center;gap:16px;background:var(--qw-panel);
    border:1px solid var(--qw-line);border-radius:var(--qw-radius);padding:14px 18px;margin-bottom:18px;}
  .mark{width:46px;height:46px;border-radius:12px;background:var(--qw-panel-2);
    display:flex;align-items:center;justify-content:center;}
  .ring{width:26px;height:26px;border-radius:50%;border:4px solid;border-image:var(--qw-grad) 1;position:relative;}
  .ring::after{content:"";position:absolute;width:7px;height:7px;border-radius:50%;background:var(--qw-teal-hi);top:5px;left:5px;}
  .word{font-weight:700;font-size:22px;color:var(--qw-text);font-family:var(--qw-font);}
  .word b{background:var(--qw-grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .layout{display:grid;grid-template-columns:200px 1fr;gap:18px;}
  .nav{background:var(--qw-panel);border:1px solid var(--qw-line);border-radius:var(--qw-radius);padding:10px;}
  .nav a{display:block;padding:9px 12px;border-radius:8px;color:var(--qw-muted);text-decoration:none;margin-bottom:2px;}
  .nav a.active{background:var(--qw-panel-2);color:var(--qw-text);border-left:3px solid var(--qw-teal);}
  .card{background:var(--qw-panel);border:1px solid var(--qw-line);border-radius:var(--qw-radius);padding:20px;}
  .title{font-weight:700;color:var(--qw-text);border-left:4px solid;border-image:var(--qw-grad) 1;padding-left:12px;margin:0 0 16px;}
  .row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--qw-line);color:var(--qw-muted);}
  .ok{color:var(--qw-teal-hi);font-weight:600;}
  label.caps{display:block;color:var(--qw-dim);text-transform:uppercase;letter-spacing:2px;font-size:11px;margin:16px 0 6px;}
  input{width:100%;box-sizing:border-box;}
  .btn{margin-top:16px;background:var(--qw-grad);color:#fff;border:0;border-radius:8px;font-weight:600;padding:10px 18px;cursor:pointer;}
  .owner{color:var(--qw-teal-hi);font-size:12px;letter-spacing:1px;margin-left:auto;}
</style></head>
<body>
  <div class="wrap">
    <div class="banner">
      <div class="mark"><div class="ring"></div></div>
      <div class="word">Qeamer<b>WRT</b></div>
      <div class="owner">build by Kent "Qeamer" Nygjerdet</div>
    </div>
    <div class="layout">
      <nav class="nav">
        <a class="active">Dashboard</a>
        <a>Firewall</a><a>DNS / DoT</a><a>DDoS shield</a>
        <a>Administration</a><a>System log</a>
      </nav>
      <section class="card">
        <h2 class="title">Security status</h2>
        <div class="row"><span>WAN admin access</span><span class="ok">Disabled</span></div>
        <div class="row"><span>DNS-over-TLS</span><span class="ok">Active · DNSSEC</span></div>
        <div class="row"><span>Firewall</span><span class="ok">Default-drop · blocklists on</span></div>
        <div class="row"><span>UPnP</span><span class="ok">Off</span></div>
        <label class="caps">Admin port</label>
        <input type="text" value="8443">
        <button class="btn">Apply &amp; save</button>
      </section>
    </div>
  </div>
</body></html>
